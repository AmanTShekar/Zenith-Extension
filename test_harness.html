<!DOCTYPE html>
<html>
<head>
    <title>Zenith Test Harness</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
        #sidebar { width: 300px; background: #1e1e1e; color: white; padding: 20px; overflow-y: auto; border-right: 1px solid #333; }
        #artboard-container { flex: 1; background: #333; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .log-entry { font-family: monospace; font-size: 12px; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .tag { display: inline-block; padding: 2px 5px; border-radius: 3px; font-size: 10px; margin-right: 5px; }
        .tag-select { background: #0ea5e9; }
        .tag-stage { background: #f59e0b; }
        .tag-rect { background: #10b981; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Zenith Bridge Monitor</h3>
        <div id="status">Waiting for heartbeat...</div>
        <hr/>
        <div id="logs"></div>
    </div>
    <div id="artboard-container">
        <iframe id="zenith-frame" src="http://127.0.0.1:3111/"></iframe>
    </div>

    <script>
        const logs = document.getElementById('logs');
        const status = document.getElementById('status');
        const frame = document.getElementById('zenith-frame');

        window.addEventListener('message', (event) => {
            if (!event.data || !event.data.type) return;

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let tag = 'INFO';
            let colorClass = '';
            
            switch(event.data.type) {
                case 'zenithSelect': tag = 'SELECT'; colorClass = 'tag-select'; break;
                case 'zenithPresence': tag = 'HEARTBEAT'; status.innerText = 'Connected: ' + new Date(event.data.timestamp).toLocaleTimeString(); return;
                case 'zenithRectSync': tag = 'RECT'; colorClass = 'tag-rect'; break;
                case 'zenithTextEdit': tag = 'EDIT'; colorClass = 'tag-stage'; break;
            }

            entry.innerHTML = `<span class="tag ${colorClass}">${tag}</span> <span>${event.data.type}</span><pre>${JSON.stringify(event.data, null, 2)}</pre>`;
            logs.prepend(entry);
        });

        // Helper to test patching from harness
        window.sendPatch = (id, prop, val) => {
            frame.contentWindow.postMessage({
                type: 'zenithPatchStyle',
                id: id,
                property: prop,
                value: val
            }, '*');
        };
    </script>
</body>
</html>
